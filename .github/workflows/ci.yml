name: Build

on:
  push:
    branches: [ master ]
    paths: [ src/**, test/**, cmake/**, .github/workflows/ci.yml, CMakeLists.txt ]
  pull_request:
    branches: [ master ]
    paths: [ src/**, test/**, cmake/**, .github/workflows/ci.yml, CMakeLists.txt ]

permissions:
  contents: read
  packages: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  BUILD_TYPE: RelWithDebInfo
  CTEST_OUTPUT_ON_FAILURE: 1
  VCPKG_BINARY_SOURCES: 'clear;nuget,GitHub,readwrite'

jobs:
  build-windows:
    name: "windows-${{matrix.platform}}"
    runs-on: windows-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        platform: [ x64, x86 ]

    steps:
    - name: Checkout source code
      uses: actions/checkout@v7
      with:
        submodules: true

    - name: Update vcpkg
      shell: pwsh
      run: |
        $vcpkgCommit = 'f9ffbaa46ad8e284b2b74919f7e0ba259564d424'
        pushd "$env:VCPKG_INSTALLATION_ROOT"
        git fetch origin $vcpkgCommit
        git reset --hard $vcpkgCommit
        ./bootstrap-vcpkg.bat
        ./vcpkg.exe integrate install
        popd

    - name: Setup NuGet Credentials
      shell: pwsh
      run: |
        $nugetCmd = vcpkg fetch nuget | Select-Object -Last 1
        $nugetSource = 'https://nuget.pkg.github.com/CelestiaProject/index.json'
        & "$nugetCmd" sources add `
          -Source "$nugetSource" `
          -StorePasswordInClearText `
          -Name "GitHub" `
          -Username 'CelestiaProject' `
          -Password '${{secrets.GITHUB_TOKEN}}'

    - name: Install dependencies
      shell: pwsh
      run: |
        $packages = @(
          'boost-container',
          'boost-container-hash',
          'boost-smart-ptr',
          'eigen3',
          'ffmpeg[core,avcodec,avformat,gpl,swscale,x264]',
          'fmt',
          'freetype',
          'gettext[tools]',
          'gperf',
          'libepoxy',
          'libjpeg-turbo',
          'libpng',
          'luajit',
          'qtbase[core,opengl,widgets,freetype,harfbuzz,jpeg,png,windeployqt]'
        )

        # We treat x86 builds as native, other builds keep host as x64-windows.
        # Currently this is equivalent to the platform triplet, but this would
        # differ if we enable arm64-windows builds in future

        if ( '${{matrix.platform}}' -eq 'x86' ) {
          $hostTriplet = 'x86-windows-release'
        } else {
          $hostTriplet = 'x64-windows-release'
        }

        pushd "$env:VCPKG_INSTALLATION_ROOT"
        ./vcpkg.exe --overlay-triplets=${{github.workspace}}/windows/vcpkg-triplets `
                    --triplet=${{matrix.platform}}-windows-release `
                    --host-triplet=$hostTriplet `
                    install --recurse @packages
        popd

    - name: Configure CMake
      shell: pwsh
      run: |
        if ( '${{matrix.platform}}' -eq 'x86' ) {
            $GeneratorPlatform = 'Win32'
        } else {
            $GeneratorPlatform = '${{matrix.platform}}'
        }

        cmake -B '${{github.workspace}}/build' `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_OVERLAY_TRIPLETS="${{github.workspace}}/windows/vcpkg-triplets" `
            -DVCPKG_TARGET_TRIPLET=${{matrix.platform}}-windows-release `
            -DCMAKE_GENERATOR_PLATFORM="$GeneratorPlatform" `
            -DCMAKE_INSTALL_PREFIX="${{github.workspace}}/install" `
            -DENABLE_SPICE=OFF    `
            -DENABLE_TOOLS=ON     `
            -DENABLE_TESTS=ON     `
            -DENABLE_SDL=OFF      `
            -DENABLE_WIN=ON       `
            -DENABLE_QT6=ON       `
            -DENABLE_FFMPEG=ON    `
            -DENABLE_MINIAUDIO=ON `
            -DENABLE_LTO=ON       `
            -DUSE_ICU=ON          `
            -DUSE_WIN_ICU=ON

    - name: Build
      shell: pwsh
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} '--' /maxcpucount:2 /nologo

    - name: Test
      shell: pwsh
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}}

    - name: Install Windows
      shell: pwsh
      run: |
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --component core
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --component wingui
        Rename-Item -Path "install" -NewName "install-wingui"

    - name: Upload Windows GUI
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: celestia-windows-${{matrix.platform}}-wingui
        if-no-files-found: error
        path: |
          ${{github.workspace}}/install-wingui/

    - name: Install Qt6
      shell: pwsh
      run: |
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --component core
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --component qt6gui
        Rename-Item -Path "install" -NewName "install-qt6gui"

    - name: Upload Qt6 GUI
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: celestia-windows-${{matrix.platform}}-qt6gui
        if-no-files-found: error
        path: |
          ${{github.workspace}}/install-qt6gui/

    - name: Install tools
      shell: pwsh
      run: |
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --component tools
        Rename-Item -Path "install" -NewName "install-tools"

    - name: Upload tools
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: celestia-windows-${{matrix.platform}}-tools
        if-no-files-found: error
        path: |
          ${{github.workspace}}/install-tools/

  build-posix:
    name: "${{matrix.config.os}}"
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        config:
        - os: ubuntu-22.04
          avif: ON
          gles: ON
          minaudio: ON
          icu: ON
          qt6: OFF
        - os: ubuntu-24.04
          avif: ON
          gles: ON
          minaudio: ON
          icu: ON
          qt6: ON
          analysis_artifacts: 1
        - os: ubuntu-24.04-arm
          avif: ON
          gles: ON
          minaudio: ON
          icu: ON
          qt6: ON

    runs-on: ${{matrix.config.os}}
    steps:
    - name: 'Install dependencies'
      run: |
        sudo apt-get update
        sudo apt-get install -y libboost-dev \
                                libeigen3-dev \
                                libepoxy-dev \
                                libavcodec-dev \
                                libavformat-dev \
                                libavutil-dev \
                                libswscale-dev \
                                libjpeg-dev \
                                libpng-dev \
                                libglu1-mesa-dev \
                                libfreetype6-dev \
                                libsdl2-dev \
                                libluajit-5.1-dev \
                                libfmt-dev \
                                libicu-dev \
                                gettext \
                                gperf \
                                ninja-build
        if [ "${{matrix.config.qt6}}" = "ON" ]; then
            sudo apt-get install -y qt6-base-dev qt6-base-dev-tools
        fi
        if [ "${{matrix.config.avif}}" = "ON" ]; then
            sudo apt-get install -y libavif-dev
        fi

    - name: 'Checkout source code'
      uses: actions/checkout@v7
      with:
        submodules: true

    - name: 'Configure CMake'
      run: |
        cmake -B ${{github.workspace}}/build                 \
              -G Ninja                                       \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON             \
              -DENABLE_GLES=${{matrix.config.gles}}          \
              -DENABLE_SPICE=OFF                             \
              -DENABLE_TOOLS=OFF                             \
              -DENABLE_TESTS=ON                              \
              -DENABLE_SDL=ON                                \
              -DENABLE_QT6=${{matrix.config.qt6}}            \
              -DENABLE_FFMPEG=ON                             \
              -DENABLE_LIBAVIF=${{matrix.config.avif}}       \
              -DENABLE_MINIAUDIO=${{matrix.config.minaudio}} \
              -DUSE_ICU=${{matrix.config.icu}}

    - name: Build
      working-directory: ${{github.workspace}}/build
      run: ninja

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest

    - name: 'Upload autogenerated sources'
      uses: actions/upload-artifact@v7
      if: ${{ success() && matrix.config.analysis_artifacts }}
      with:
        name: celestia-autogenerated-sources
        path: |
          build/compile_commands.json
          build/src/**/*_autogen/**/*.c
          build/src/**/*_autogen/**/*.cc
          build/src/**/*_autogen/**/*.cpp
          build/src/**/*_autogen/**/*.cxx
          build/src/**/*_autogen/**/*.h
          build/src/**/*_autogen/**/*.hh
          build/src/**/*_autogen/**/*.hpp
          build/src/**/*_autogen/**/*.hxx
          build/src/**/*_autogen/**/*.inc

  build-macos:
    name: "macos-latest"
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
    - name: 'Install dependencies'
      run: |
        brew install ninja \
                     eigen \
                     ffmpeg \
                     boost \
                     fast_float \
                     fmt \
                     jpeg-turbo \
                     gettext \
                     gperf \
                     libpng \
                     lua \
                     freetype \
                     libepoxy \
                     libavif \
                     qt@6 \
                     sdl2

    - name: 'Checkout source code'
      uses: actions/checkout@v7
      with:
        submodules: true

    - name: 'Configure CMake'
      run: |
        cmake -B ${{github.workspace}}/build \
              -G Ninja                       \
              -DENABLE_GLES=OFF              \
              -DENABLE_SPICE=OFF             \
              -DENABLE_TOOLS=OFF             \
              -DENABLE_TESTS=ON              \
              -DENABLE_SDL=ON                \
              -DENABLE_QT6=ON                \
              -DENABLE_FFMPEG=ON             \
              -DENABLE_LIBAVIF=ON            \
              -DENABLE_MINIAUDIO=ON          \
              -DUSE_ICU=OFF

    - name: Build
      working-directory: ${{github.workspace}}/build
      run: ninja

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest

  build-freebsd:
    name: "freebsd"
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: 'Checkout source code'
      uses: actions/checkout@v7
      with:
        submodules: true

    - name: 'Start VM'
      id: vm
      uses: vmactions/freebsd-vm@v1
      with:
        arch: x86_64
        sync: rsync
        copyback: false

    - name: 'Install dependencies'
      shell: freebsd {0}
      run: |
            pkg install -y cmake            \
                           ninja            \
                           git              \
                           eigen            \
                           libepoxy         \
                           fast_float       \
                           gettext          \
                           gperf            \
                           jpeg-turbo       \
                           png              \
                           mesa-libs        \
                           meshoptimizer    \
                           freetype2        \
                           luajit           \
                           libfmt           \
                           icu              \
                           pkgconf          \
                           boost-libs       \
                           sdl2

    - name: 'Configure CMake'
      shell: freebsd {0}
      run: |
        cmake -B build                  \
              -G Ninja                  \
              -DCMAKE_BUILD_TYPE=Debug  \
              -DENABLE_GLES=ON          \
              -DENABLE_SPICE=OFF        \
              -DENABLE_TOOLS=OFF        \
              -DENABLE_TESTS=ON         \
              -DENABLE_SDL=ON           \
              -DENABLE_FFMPEG=OFF       \
              -DENABLE_LIBAVIF=OFF      \
              -DENABLE_MINIAUDIO=ON     \
              -DUSE_ICU=OFF # tests fail on freebsd

    - name: Build
      shell: freebsd {0}
      run: |
        cmake --build build --parallel

    - name: Run tests
      shell: freebsd {0}
      run: |
        ctest --progress --extra-verbose --output-on-failure --test-dir build
